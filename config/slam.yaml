slam_toolbox:
  ros__parameters:
    # Plugin params
    solver_plugin: solver_plugins::CeresSolver
    ceres_linear_solver: SPARSE_NORMAL_CHOLESKY
    ceres_preconditioner: SCHUR_JACOBI
    ceres_trust_strategy: LEVENBERG_MARQUARDT
    ceres_dogleg_type: TRADITIONAL_DOGLEG
    ceres_loss_function: None

    # Mode: builds the map AND localizes within it simultaneously (true SLAM).
    # This is what you want since you have no prior map.
    mode: mapping

    # Frames
    odom_frame: odom
    base_frame: root
    map_frame: map
    scan_topic: /scan

    # Transform handling
    # Bumped from 0.2 default to tolerate your measured /scan jitter (max ~0.34s)
    transform_timeout: 0.5
    tf_buffer_duration: 30.0
    transform_publish_period: 0.02
    map_update_interval: 2.0

    # Scan/map params
    resolution: 0.05
    max_laser_range: 20.0
    minimum_time_interval: 0.05
    minimum_travel_distance: 0.02
    minimum_travel_heading: 0.02
    use_scan_matching: true
    use_scan_barycenter: true
    minimum_similarity_score: 0.3

    # General
    use_sim_time: false
    debug_logging: false
    throttle_scans: 1
    stack_size_to_use: 40000000
