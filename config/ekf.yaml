ekf_node:
  ros__parameters:
    frequency: 60.0

    # 1. Planar Environment Control
    # Set to true since your ARCC Field 2026 arena is flat.
    two_d_mode: true

    publish_acceleration: false
    publish_tf: true

    # 2. Structural Frame Assignments
    map_frame: map
    odom_frame: odom
    base_link_frame: root # <-- CRITICAL: Must be 'root' to match your base frame
    world_frame: odom

    # 3. Connect to the Live Bridge Topic
    odom0: /odom # <-- Changed from 'demo/odom' to match your bridge YAML

    # 4. Sensor Kinematics Mask
    # Tracks X velocity, Y velocity (strafing pods), and Z yaw rotation rate.
    # On a mobile base, tracking velocities instead of raw positions prevents filter drift.
    odom0_config: [
        false,
        false,
        false, # x,  y,  z  positions
        false,
        false,
        false, # r,  p,  y  orientations
        true,
        true,
        false, # vx, vy, vz velocities (ENABLED for X & Y)
        false,
        false,
        true, # vr, vp, vy angular rates (ENABLED for Yaw)
        false,
        false,
        false,
      ] # ax, ay, az accelerations

    odom0_differential: false
    odom0_relative: false
    odom0_queue_size: 10
